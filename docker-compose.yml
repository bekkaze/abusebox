services:
  backend:
    image: ghcr.io/${GHCR_REPO:-bekkaze/abusebox}-backend:latest
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      - APP_DEBUG=true
      - APP_SECRET_KEY=change-me-in-production
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:3000
      - DATABASE_URL=sqlite:////app/data/app.db
      - DEFAULT_ADMIN_USERNAME=admin
      - DEFAULT_ADMIN_EMAIL=admin@abusebox.local
      - DEFAULT_ADMIN_PASSWORD=password123
      - DEFAULT_ADMIN_PHONE=11111111
    volumes:
      - abusebox-data:/app/data
    ports:
      - 8100:8100
  frontend:
    image: ghcr.io/${GHCR_REPO:-bekkaze/abusebox}-frontend:latest
    build: ./frontend
    depends_on:
      - backend
    environment:
      - VITE_BASE_URL=http://backend:8100
      - VITE_API_DOCS_URL=http://localhost:8100/swagger/
    ports:
      - 3000:3000

volumes:
  abusebox-data:
